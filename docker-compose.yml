services:
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      DB_PATH: /data/speakeasy.db
    volumes:
      - db-data:/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.speakeasyhome.rule=Host(`speakeasyhome.stacklab.be`)"
      - "traefik.http.routers.speakeasyhome.entrypoints=web"
      - "traefik.http.services.speakeasyhome.loadbalancer.server.port=80"

volumes:
  db-data:

networks:
  traefik:
    external: true
    name: budgetmanager_budgetmanager-network
