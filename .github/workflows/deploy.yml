name: Deploy to speakeasyhome.stacklab.be

on:
  push:
    branches: [main]

jobs:
  test:
    name: Tests backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: backend
        run: npm test

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test, build-frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create remote directories
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p /home/cyril/speakeasyhome/frontend/dist /home/cyril/speakeasyhome/backend"

      - name: Sync frontend dist to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no" \
            frontend/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/cyril/speakeasyhome/frontend/dist/

      - name: Sync backend source to VPS
        run: |
          rsync -az --delete \
            --exclude node_modules \
            --exclude dist \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no" \
            backend/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/cyril/speakeasyhome/backend/

      - name: Sync root config to VPS
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no" \
            Dockerfile nginx.conf docker-compose.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/cyril/speakeasyhome/

      - name: Discover Traefik network
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "docker network ls && echo '---' && docker inspect budgetmanager-traefik --format '{{json .NetworkSettings.Networks}}' 2>/dev/null || true"

      - name: Rebuild and restart containers
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /home/cyril/speakeasyhome && docker compose down && docker compose up -d --build"
