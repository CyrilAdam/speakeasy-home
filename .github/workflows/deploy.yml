name: Deploy to speakeasyhome.stacklab.be

on:
  push:
    branches: [main]

jobs:
  test:
    name: Tests backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: backend
        run: npm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test   # ← bloque le déploiement si les tests échouent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync html files to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no" \
            html/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/cyril/speakeasyhome/html/

      - name: Rebuild and restart container
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.VPS_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /home/cyril/speakeasyhome && docker compose up -d --build"
