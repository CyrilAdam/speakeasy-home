server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    types {
        text/html                   html htm;
        text/css                    css;
        text/javascript             js jsx mjs;
        application/json            json;
        image/svg+xml               svg svgz;
        image/png                   png;
        image/jpeg                  jpg jpeg;
        image/gif                   gif;
        image/webp                  webp;
        font/woff2                  woff2;
        font/woff                   woff;
    }
}
