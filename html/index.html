<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #08080F;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle page bg */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, #1a1a3a44, transparent);
      pointer-events: none;
    }

    /* Page label */
    body::after {
      content: "Bar — Prototype";
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.15);
    }

    /* Scroll reset */
    ::-webkit-scrollbar { width: 0; height: 0; }

    /* Detail slide-up animation */
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* Phone frame */
    .phone-wrap {
      position: relative;
      width: 390px;
      height: 844px;
    }

    .phone-frame {
      position: absolute; inset: 0;
      border-radius: 50px;
      border: 8px solid #1c1c2a;
      box-shadow:
        0 0 0 1px #2a2a3a,
        0 40px 80px rgba(0,0,0,0.8),
        inset 0 0 0 1px #0a0a14;
      overflow: hidden;
      background: #0D0D1A;
      display: flex;
      flex-direction: column;
    }

    /* Status bar */
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px 8px;
      flex-shrink: 0;
      background: transparent;
      position: relative; z-index: 10;
    }
    .status-time {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      color: rgba(255,255,255,0.9);
      letter-spacing: -0.01em;
    }
    .status-icons {
      display: flex; align-items: center; gap: 6px;
    }
    .status-icons svg { display: block; }

    /* Dynamic notch */
    .dynamic-island {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #000; border-radius: 20px;
      z-index: 20;
    }

    /* App area fills remaining space */
    .app-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* Tweaks panel trigger (bottom-right of frame) */
    #tweaks-anchor {
      position: fixed; bottom: 24px; right: 24px; z-index: 1000;
    }
  </style>
</head>
<body>

<div class="phone-wrap">
  <div class="phone-frame">

    <!-- Dynamic Island -->
    <div class="dynamic-island"></div>

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="status-time">21:42</span>
      <div class="status-icons">
        <!-- Signal -->
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
          <rect x="0"  y="8" width="3" height="4" rx="1" fill="white" opacity="0.4"/>
          <rect x="4.5" y="5.5" width="3" height="6.5" rx="1" fill="white" opacity="0.6"/>
          <rect x="9"  y="3" width="3" height="9" rx="1" fill="white" opacity="0.8"/>
          <rect x="13.5" y="0" width="3" height="12" rx="1" fill="white"/>
        </svg>
        <!-- Wifi -->
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white">
          <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z" opacity="1"/>
          <path d="M3.5 6.5C4.9 5.1 6.4 4.3 8 4.3s3.1.8 4.5 2.2" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round" opacity="0.8"/>
          <path d="M1 3.5C3 1.5 5.4 0.3 8 0.3s5 1.2 7 3.2" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round" opacity="0.5"/>
        </svg>
        <!-- Battery -->
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
          <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" strokeOpacity="0.35"/>
          <rect x="2" y="2" width="16" height="8" rx="2" fill="white"/>
          <path d="M22.5 4v4a2 2 0 0 0 0-4z" fill="white" opacity="0.4"/>
        </svg>
      </div>
    </div>

    <!-- App Root -->
    <div class="app-area" id="app-root"></div>

  </div>

  <!-- Tweaks anchor (outside scaled frame) -->
  <div id="tweaks-anchor"></div>
</div>

<!-- Data -->
<script src="cocktails-data.js"></script>

<!-- iOS Frame (not actually used — we drew our own above) -->
<!-- App Components -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="cocktail-scenes.jsx"></script>
<script type="text/babel" src="add-cocktail-modal.jsx"></script>
<script type="text/babel" src="manage-modals.jsx"></script>
<script type="text/babel" src="cocktails-app.jsx"></script>

<!-- Mount + Tweaks wiring -->
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "layout": "list",
  "accentColor": "#A0C4FF",
  "showMoods": true,
  "palette": "ébène"
}/*EDITMODE-END*/;

function Root() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <React.Fragment>
      <CocktailApp tweaks={t} />
      <TweaksPanel>
        <TweakSection label="Disposition" />
        <TweakRadio
          label="Cartes"
          value={t.layout}
          options={["list", "grid"]}
          onChange={v => setTweak("layout", v)}
        />
        <TweakSection label="Interface" />
        <TweakToggle
          label="Tags d'humeur"
          value={t.showMoods}
          onChange={v => setTweak("showMoods", v)}
        />
        <TweakColor
          label="Couleur nav"
          value={t.accentColor}
          options={["#A0C4FF", "#FFB3C6", "#B9FBC0", "#FFD6A5"]}
          onChange={v => setTweak("accentColor", v)}
        />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("app-root")).render(<Root />);
</script>

</body>
</html>
