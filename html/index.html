<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #08080F;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle page bg */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, #1a1a3a44, transparent);
      pointer-events: none;
    }

    /* Page label */
    body::after {
      content: "Bar — Prototype";
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.15);
    }

    /* Scroll reset */
    ::-webkit-scrollbar { width: 0; height: 0; }

    /* Detail slide-up animation */
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* Phone frame */
    .phone-wrap {
      position: relative;
      width: 390px;
      height: 844px;
    }

    .phone-frame {
      position: absolute; inset: 0;
      border-radius: 50px;
      border: 8px solid #1c1c2a;
      box-shadow:
        0 0 0 1px #2a2a3a,
        0 40px 80px rgba(0,0,0,0.8),
        inset 0 0 0 1px #0a0a14;
      overflow: hidden;
      background: #0D0D1A;
      display: flex;
      flex-direction: column;
    }

    /* Status bar */
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px 8px;
      flex-shrink: 0;
      background: transparent;
      position: relative; z-index: 10;
    }
    .status-time {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      color: rgba(255,255,255,0.9);
      letter-spacing: -0.01em;
    }
    .status-icons {
      display: flex; align-items: center; gap: 6px;
    }
    .status-icons svg { display: block; }

    /* Dynamic notch */
    .dynamic-island {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #000; border-radius: 20px;
      z-index: 20;
    }

    /* App area fills remaining space */
    .app-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* Tweaks panel trigger (bottom-right of frame) */
    #tweaks-anchor {
      position: fixed; bottom: 24px; right: 24px; z-index: 1000;
    }
  </style>
</head>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

});

function GlassShot({ layers }) {
  return (
    <svg viewBox="0 0 200 220" width="100" height="110">
      <path d="M62,20 L52,190 L148,190 L138,20 Z" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" strokeWidth="1.5"/>

      {layers.map((col, i) => {
        const totalLayers = layers.length;
        const segH = 155 / totalLayers;
        const y = 30 + i * segH;
        const w1 = 76 + i * (10/totalLayers);
        const w2 = 76 + (i+1) * (10/totalLayers);
        return (
          <path key={i} d={`M${100-w1/2},${y} L${100-w2/2},${y+segH} L${100+w2/2},${y+segH} L${100+w1/2},${y} Z`}
            fill={col} opacity="0.85"/>
        );
      })}
      {/* Rim */}
      <line x1="62" y1="20" x2="138" y2="20" stroke="rgba(255,255,255,0.5)" strokeWidth="2"/>

<script type="text/babel">
// add-cocktail-modal.jsx
// Formulaire d'ajout de cocktail avec génération IA via Pollinations.ai + Claude

const MOOD_OPTIONS = ["festif","été","classique","amer","frais","élégant","fort","pétillant","herbacé","moderne","apéro","coloré","shot","léger","maison"];
const GLASS_OPTIONS = ["Verre à Margarita","Old Fashioned","Verre Highball","Verre à martini","Coupe","Verre à vin","Verre à shot","Mug en cuivre","Autre"];
const DIFF_LABELS   = { 1:"Facile", 2:"Moyen", 3:"Expert" };

const ALabel = ({ children }) => (
  <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: "0.08em", color: "rgba(255,255,255,0.35)", textTransform: "uppercase", marginBottom: 7 }}>
    {children}
  </div>
);
const aInputStyle = {
  width: "100%", boxSizing: "border-box",
  background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)",
  borderRadius: 12, padding: "11px 14px", color: "#fff", fontSize: 14,
  fontFamily: "inherit", outline: "none",
};

// Simple hash → fallback theme
function hashTheme(name) {
  const h = name.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  const palettes = [
    { bg:"#071A0F", from:"#1B5E35", mid:"#2D9E5A", to:"#52B788", accent:"#74C69D", text:"#D8F3DC" },
    { bg:"#190505", from:"#7B1D1D", mid:"#C0392B", to:"#E74C3C", accent:"#FF6B6B", text:"#FDEDEC" },
    { bg:"#180900", from:"#7B3F00", mid:"#A0522D", to:"#D2691E", accent:"#E8A87C", text:"#FFF3E0" },
    { bg:"#150010", from:"#880035", mid:"#C2185B", to:"#E91E8C", accent:"#F48FB1", text:"#FCE4EC" },
    { bg:"#081200", from:"#2D5016", mid:"#5A8000", to:"#84A000", accent:"#A8D500", text:"#F0FFC0" },
    { bg:"#150900", from:"#6B3000", mid:"#B87800", to:"#E8A000", accent:"#FFB830", text:"#FFF8E0" },
  ];
  return palettes[h % palettes.length];
}

function AddCocktailModal({ onAdd, onDelete, onClose, initialData }) {
  const editMode = !!initialData;
  const [name, setName]         = React.useState(initialData?.name || "");
  const [tagline, setTagline]   = React.useState(initialData?.tagline || "");
  const [glass, setGlass]       = React.useState(initialData?.glass || "Verre à cocktail");
  const [moods, setMoods]       = React.useState(initialData?.moods || []);
  const [difficulty, setDiff]   = React.useState(initialData?.difficulty || 1);
  const [ingredients, setIngs]  = React.useState(
    initialData?.ingredients?.map(i=>({name:i.customName||i.name||APP_DATA.bottleMap[i.id]?.name||"",amount:i.amount||""})) || [{name:"",amount:""}]);
  const [steps, setSteps]       = React.useState(initialData?.steps || [""]);
  const [generating, setGen]    = React.useState(false);
  const [genStatus, setStatus]  = React.useState("");
  const [sceneUrl, setScene]    = React.useState(initialData?.sceneUrl || null);
  const [glassUrl, setGlass_]   = React.useState(initialData?.glassUrl || null);
  const [theme, setTheme]       = React.useState(initialData?.theme || null);
  const [confirm, setConfirm]   = React.useState(false);

  const toggleMood = m => setMoods(ms => ms.includes(m) ? ms.filter(x => x !== m) : [...ms, m]);
  const updIng  = (i, f, v) => setIngs(arr => arr.map((it, j) => j === i ? { ...it, [f]: v } : it));
  const addIng  = () => setIngs(a => [...a, { name: "", amount: "" }]);
  const rmIng   = i  => setIngs(a => a.filter((_, j) => j !== i));
  const updStep = (i, v) => setSteps(a => a.map((s, j) => j === i ? v : s));
  const addStep = () => setSteps(a => [...a, ""]);
  const rmStep  = i  => setSteps(a => a.filter((_, j) => j !== i));

  const generate = async () => {
    if (!name.trim()) return;
    setGen(true);

    const ingList = ingredients.filter(x => x.name).map(x => x.name).join(", ");
    const seed1 = Math.floor(Math.random() * 9999);
    const seed2 = seed1 + 500;

    // Scene image via Pollinations.ai
    setStatus("Scène en cours…");
    const sp = encodeURIComponent(`${name} cocktail bar atmosphere moody cinematic dark lighting beautiful photorealistic no text no watermark`);
    setScene(`https://image.pollinations.ai/prompt/${sp}?width=390&height=260&nologo=true&model=flux-schnell&seed=${seed1}`);

    // Glass image
    setStatus("Illustration du verre…");
    const gp = encodeURIComponent(`${name} cocktail glass professional photography black background studio lighting beautiful garnish bokeh`);
    setGlass_(`https://image.pollinations.ai/prompt/${gp}?width=300&height=420&nologo=true&model=flux-schnell&seed=${seed2}`);

    // Color palette via Claude
    setStatus("Palette de couleurs…");
    try {
      const res = await window.claude.complete({
        messages: [{
          role: "user",
          content: `Cocktail "${name}" (ingrédients: ${ingList || "variés"}). Génère un thème de couleurs sombre et riche. Réponds UNIQUEMENT en JSON valide sans markdown ni explication: {"bg":"#hex","from":"#hex","mid":"#hex","to":"#hex","accent":"#hex","text":"#hex"}. bg très sombre (#0x0x0x), from/mid sombres mais colorés, to et accent vibrants, text clair lisible.`,
        }],
      });
      const m = res.match(/\{[^}]+\}/);
      setTheme(m ? JSON.parse(m[0]) : hashTheme(name));
    } catch (_) {
      setTheme(hashTheme(name));
    }

    setGen(false);
    setStatus("done");
  };

  const canGenerate = name.trim().length >= 2;
  const canSubmit   = canGenerate && !!theme;

  const handleSubmit = () => {
    if (!canSubmit) return;
    const t = theme || hashTheme(name);
    onAdd({
      id: `custom-${Date.now()}`,
      name: name.trim(),
      tagline: tagline.trim() || "Mon cocktail maison",
      moods: moods.length ? moods : ["maison"],
      difficulty,
      time: "? min",
      glass,
      garnish: "À votre goût",
      theme: t,
      ingredients: ingredients.filter(x => x.name).map((x, i) => ({ id: `ci-${Date.now()}-${i}`, customName: x.name, amount: x.amount })),
      steps: steps.filter(s => s.trim()),
      sceneUrl: sceneUrl || null,
      glassUrl: glassUrl || null,
      custom: true,
    });
    onClose();
  };

  const Row = ({ children }) => (
    <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 7 }}>{children}</div>
  );

  return (
    <div style={{ position: "absolute", inset: 0, zIndex: 155, background: "rgba(0,0,0,0.72)", backdropFilter: "blur(12px)", display: "flex", flexDirection: "column", justifyContent: "flex-end" }}
      onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background: "#13131F", border: "1px solid rgba(255,255,255,0.1)",
        borderRadius: "24px 24px 0 0", maxHeight: "90%", display: "flex", flexDirection: "column",
        animation: "slideUpModal 0.28s cubic-bezier(0.4,0,0.2,1)",
      }}>

        {/* Handle + title */}
        <div style={{ flexShrink: 0 }}>
          <div style={{ display: "flex", justifyContent: "center", padding: "12px 0 2px" }}>
            <div style={{ width: 36, height: 4, borderRadius: 2, background: "rgba(255,255,255,0.18)" }} />
          </div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 20px 12px" }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#fff", letterSpacing: "-0.02em" }}>{editMode ? "Modifier le cocktail" : "Nouveau cocktail"}</div>
            <button onClick={onClose} style={{ background: "rgba(255,255,255,0.07)", border: "none", borderRadius: 20, padding: "5px 12px", color: "rgba(255,255,255,0.45)", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Annuler</button>
          </div>
        </div>

        {/* Scrollable body */}
        <div style={{ flex: 1, overflowY: "auto", padding: "0 20px", display: "flex", flexDirection: "column", gap: 16 }}>

          {/* Nom + tagline */}
          <div>
            <ALabel>Nom *</ALabel>
            <input value={name} onChange={e => setName(e.target.value)} placeholder="Ex : Jungle Bird…" autoFocus style={aInputStyle} />
            <div style={{ marginTop: 7 }}>
              <input value={tagline} onChange={e => setTagline(e.target.value)} placeholder="Tagline (optionnel)" style={{ ...aInputStyle, fontSize: 13 }} />
            </div>
          </div>

          {/* Ingrédients */}
          <div>
            <ALabel>Ingrédients</ALabel>
            {ingredients.map((ing, i) => (
              <Row key={i}>
                <input value={ing.name} onChange={e => updIng(i, "name", e.target.value)} placeholder="Campari, rhum…" style={{ ...aInputStyle, flex: 2, padding: "9px 12px", fontSize: 13 }} />
                <input value={ing.amount} onChange={e => updIng(i, "amount", e.target.value)} placeholder="3 cl" style={{ ...aInputStyle, flex: 1, padding: "9px 10px", fontSize: 13 }} />
                {ingredients.length > 1 && (
                  <button onClick={() => rmIng(i)} style={{ background: "rgba(255,60,60,0.1)", border: "1px solid rgba(255,60,60,0.2)", borderRadius: 8, width: 30, height: 30, cursor: "pointer", color: "rgba(255,100,100,0.7)", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontFamily: "inherit" }}>×</button>
                )}
              </Row>
            ))}
            <button onClick={addIng} style={{ background: "rgba(255,255,255,0.04)", border: "1px dashed rgba(255,255,255,0.18)", borderRadius: 12, padding: "7px 14px", color: "rgba(255,255,255,0.35)", fontSize: 12, cursor: "pointer", fontFamily: "inherit", width: "100%" }}>+ ingrédient</button>
          </div>

          {/* Étapes */}
          <div>
            <ALabel>Étapes</ALabel>
            {steps.map((st, i) => (
              <Row key={i} style={{ alignItems: "flex-start" }}>
                <div style={{ width: 22, height: 22, borderRadius: "50%", background: "rgba(160,196,255,0.12)", border: "1px solid rgba(160,196,255,0.28)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 9 }}>
                  <span style={{ color: "#A0C4FF", fontSize: 11, fontWeight: 700 }}>{i + 1}</span>
                </div>
                <input value={st} onChange={e => updStep(i, e.target.value)} placeholder={`Étape ${i + 1}…`} style={{ ...aInputStyle, flex: 1, padding: "9px 12px", fontSize: 13 }} />
                {steps.length > 1 && (
                  <button onClick={() => rmStep(i)} style={{ background: "rgba(255,60,60,0.1)", border: "1px solid rgba(255,60,60,0.2)", borderRadius: 8, width: 30, height: 30, cursor: "pointer", color: "rgba(255,100,100,0.7)", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 4, fontFamily: "inherit" }}>×</button>
                )}
              </Row>
            ))}
            <button onClick={addStep} style={{ background: "rgba(255,255,255,0.04)", border: "1px dashed rgba(255,255,255,0.18)", borderRadius: 12, padding: "7px 14px", color: "rgba(255,255,255,0.35)", fontSize: 12, cursor: "pointer", fontFamily: "inherit", width: "100%" }}>+ étape</button>
          </div>

          {/* Verre */}
          <div>
            <ALabel>Verre</ALabel>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {GLASS_OPTIONS.map(g => (
                <button key={g} onClick={() => setGlass(g)} style={{ padding: "5px 11px", borderRadius: 20, cursor: "pointer", fontFamily: "inherit", fontSize: 11.5, background: glass === g ? "rgba(160,196,255,0.14)" : "rgba(255,255,255,0.04)", border: glass === g ? "1.5px solid rgba(160,196,255,0.5)" : "1.5px solid rgba(255,255,255,0.09)", color: glass === g ? "#A0C4FF" : "rgba(255,255,255,0.4)", fontWeight: glass === g ? 700 : 400 }}>{g}</button>
              ))}
            </div>
          </div>

          {/* Humeurs */}
          <div>
            <ALabel>Tags / humeurs</ALabel>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {MOOD_OPTIONS.map(m => (
                <button key={m} onClick={() => toggleMood(m)} style={{ padding: "5px 11px", borderRadius: 20, cursor: "pointer", fontFamily: "inherit", fontSize: 11.5, background: moods.includes(m) ? "rgba(255,255,255,0.14)" : "rgba(255,255,255,0.04)", border: moods.includes(m) ? "1.5px solid rgba(255,255,255,0.45)" : "1.5px solid rgba(255,255,255,0.09)", color: moods.includes(m) ? "#fff" : "rgba(255,255,255,0.38)", fontWeight: moods.includes(m) ? 700 : 400 }}>{m}</button>
              ))}
            </div>
          </div>

          {/* Difficulté */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <ALabel>Difficulté</ALabel>
            <div style={{ display: "flex", gap: 6, marginBottom: 7 }}>
              {[1,2,3].map(d => (
                <button key={d} onClick={() => setDiff(d)} style={{ padding: "5px 13px", borderRadius: 20, cursor: "pointer", fontFamily: "inherit", fontSize: 12, background: difficulty === d ? "rgba(160,196,255,0.14)" : "rgba(255,255,255,0.04)", border: difficulty === d ? "1.5px solid rgba(160,196,255,0.5)" : "1.5px solid rgba(255,255,255,0.09)", color: difficulty === d ? "#A0C4FF" : "rgba(255,255,255,0.4)", fontWeight: difficulty === d ? 700 : 400 }}>{DIFF_LABELS[d]}</button>
              ))}
            </div>
          </div>

          {/* IA Generation */}
          <div style={{ background: "rgba(139,92,246,0.06)", border: "1px solid rgba(139,92,246,0.2)", borderRadius: 18, padding: 14, marginBottom: 4 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: sceneUrl || theme ? 12 : 0 }}>
              <div>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#C4B5FD" }}>Visuels IA</div>
                <div style={{ fontSize: 11, color: "rgba(196,181,253,0.45)", marginTop: 1 }}>Pollinations.ai + Claude</div>
              </div>
              <button onClick={generate} disabled={!canGenerate || generating} style={{
                padding: "8px 16px", borderRadius: 20, border: "none", cursor: canGenerate && !generating ? "pointer" : "default", fontFamily: "inherit",
                background: canGenerate && !generating ? "linear-gradient(130deg,#7C3AED,#8B5CF6)" : "rgba(255,255,255,0.06)",
                color: canGenerate && !generating ? "#fff" : "rgba(255,255,255,0.2)",
                fontSize: 12.5, fontWeight: 700, display: "flex", alignItems: "center", gap: 5, transition: "all 0.2s",
              }}>
                <span style={{ animation: generating ? "spin 1s linear infinite" : "none", display: "inline-block" }}>✦</span>
                {generating ? genStatus : "Générer"}
              </button>
            </div>
            {/* Previews */}
            {(sceneUrl || glassUrl || theme) && (
              <div style={{ display: "flex", gap: 8, alignItems: "stretch" }}>
                {sceneUrl && (
                  <div style={{ flex: 2, borderRadius: 10, overflow: "hidden", background: "rgba(255,255,255,0.04)", minHeight: 70 }}>
                    <img src={sceneUrl} alt="" style={{ width: "100%", height: 80, objectFit: "cover", display: "block" }}
                      onError={e => e.target.parentElement.style.display = "none"} />
                  </div>
                )}
                {glassUrl && (
                  <div style={{ flex: 1, borderRadius: 10, overflow: "hidden", background: "rgba(255,255,255,0.04)", minHeight: 70 }}>
                    <img src={glassUrl} alt="" style={{ width: "100%", height: 80, objectFit: "cover", display: "block" }}
                      onError={e => e.target.parentElement.style.display = "none"} />
                  </div>
                )}
                {theme && (
                  <div style={{ flex: "0 0 36px", display: "flex", flexDirection: "column", gap: 3, borderRadius: 10, overflow: "hidden" }}>
                    {[theme.bg, theme.from, theme.mid, theme.to, theme.accent].map((c, i) => (
                      <div key={i} style={{ flex: 1, background: c, borderRadius: i === 0 ? "10px 10px 0 0" : i === 4 ? "0 0 10px 10px" : 0 }} />
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>

        </div>

        {/* Submit + delete */}
        <div style={{ padding: "12px 20px 30px", flexShrink: 0, borderTop: "1px solid rgba(255,255,255,0.07)", display: "flex", flexDirection: "column", gap: 8 }}>
          {confirm ? (
            <>
              <div style={{fontSize:12.5,color:"rgba(255,255,255,0.5)",textAlign:"center",marginBottom:2}}>Supprimer ce cocktail ?</div>
              <button onClick={onDelete} style={{padding:13,border:"none",borderRadius:14,background:"#C0392B",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>Supprimer définitivement</button>
              <button onClick={()=>setConfirm(false)} style={{padding:11,border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,background:"transparent",color:"rgba(255,255,255,0.45)",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Annuler</button>
            </>
          ) : (
            <>
              <button onClick={handleSubmit} disabled={!canSubmit} style={{
                width: "100%", padding: 14, border: "none", borderRadius: 16, fontFamily: "inherit",
                background: canSubmit ? "linear-gradient(130deg,#52B788,#A0C4FF)" : "rgba(255,255,255,0.07)",
                color: canSubmit ? "#fff" : "rgba(255,255,255,0.2)",
                fontSize: 15, fontWeight: 800, cursor: canSubmit ? "pointer" : "default", transition: "all 0.2s",
              }}>
                {canSubmit ? (editMode ? "Enregistrer les modifications" : "Créer le cocktail") : "Générer les visuels d'abord ✨"}
              </button>
              {editMode && onDelete && (
                <button onClick={()=>setConfirm(true)} style={{padding:11,border:"1px solid rgba(255,60,60,0.25)",borderRadius:14,background:"rgba(255,60,60,0.07)",color:"rgba(255,100,100,0.65)",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                  Supprimer ce cocktail
                </button>
              )}
            </>
          )}
        </div>

      </div>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

Object.assign(window, { AddCocktailModal });

</script>
<script type="text/babel">
// manage-modals.jsx — EditBottleModal + ManageCategoriesModal

const CAT_COLORS = {
  "Tequila":"#D4A017","Vodka":"#90CAF9","Rhum":"#F5DEB3","Gin":"#B2EBF2",
  "Whiskey":"#C8963C","Cognac":"#8B4513","Liqueur":"#FF7043","Vermouth":"#8B1C1C",
  "Amer":"#C4180A","Bitters":"#7B3F00","Pétillant":"#F5DEB3","Vin":"#722F37",
  "Jus":"#FFF176","Soda":"#E3F2FD","Sirop":"#FFE0B2","Autre":"#9E9E9E",
};
const getCatColor = (cat, fallback = "#9E9E9E") => CAT_COLORS[cat] || fallback;

// ─── Shared style helpers ─────────────────────────────────────────────────
const mInputStyle = {
  width:"100%", boxSizing:"border-box",
  background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.12)",
  borderRadius:12, padding:"11px 14px", color:"#fff", fontSize:14,
  fontFamily:"inherit", outline:"none",
};
const MLabel = ({children}) => (
  <div style={{fontSize:10.5,fontWeight:700,letterSpacing:"0.08em",color:"rgba(255,255,255,0.35)",textTransform:"uppercase",marginBottom:7}}>
    {children}
  </div>
);
const ModalWrap = ({onClose, children}) => (
  <div style={{position:"absolute",inset:0,zIndex:160,background:"rgba(0,0,0,0.72)",backdropFilter:"blur(12px)",display:"flex",flexDirection:"column",justifyContent:"flex-end"}}
    onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#13131F",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"24px 24px 0 0",maxHeight:"88%",display:"flex",flexDirection:"column",animation:"slideUpModal 0.28s cubic-bezier(0.4,0,0.2,1)"}}>
      <div style={{display:"flex",justifyContent:"center",padding:"12px 0 2px",flexShrink:0}}>
        <div style={{width:36,height:4,borderRadius:2,background:"rgba(255,255,255,0.18)"}}/>
      </div>
      {children}
    </div>
  </div>
);

// ─── Edit Bottle Modal ────────────────────────────────────────────────────
function EditBottleModal({ bottle, allCategories, onSave, onDelete, onClose }) {
  const [name, setName]       = React.useState(bottle.name);
  const [category, setCategory] = React.useState(bottle.category);
  const [pantry, setPantry]   = React.useState(!!bottle.pantry);
  const [confirm, setConfirm] = React.useState(false);
  const canSave = name.trim() && category;

  return (
    <ModalWrap onClose={onClose}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 20px 14px",flexShrink:0}}>
        <div style={{fontSize:18,fontWeight:800,color:"#fff",letterSpacing:"-0.02em"}}>Modifier la bouteille</div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.07)",border:"none",borderRadius:20,padding:"5px 12px",color:"rgba(255,255,255,0.45)",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Annuler</button>
      </div>

      {/* Form */}
      <div style={{flex:1,overflowY:"auto",padding:"0 20px",display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <MLabel>Nom</MLabel>
          <input value={name} onChange={e=>setName(e.target.value)} style={mInputStyle}/>
        </div>

        <div>
          <MLabel>Catégorie</MLabel>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {allCategories.map(cat=>(
              <button key={cat} onClick={()=>setCategory(cat)} style={{
                padding:"5px 12px",borderRadius:20,cursor:"pointer",fontFamily:"inherit",
                background:category===cat?`${getCatColor(cat)}28`:"rgba(255,255,255,0.05)",
                border:category===cat?`1.5px solid ${getCatColor(cat)}70`:"1.5px solid rgba(255,255,255,0.09)",
                color:category===cat?getCatColor(cat):"rgba(255,255,255,0.45)",
                fontSize:12,fontWeight:category===cat?700:400,transition:"all 0.14s",
              }}>{cat}</button>
            ))}
          </div>
        </div>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingBottom:4}}>
          <div>
            <div style={{fontSize:13.5,fontWeight:600,color:"rgba(255,255,255,0.75)"}}>Toujours disponible</div>
            <div style={{fontSize:11.5,color:"rgba(255,255,255,0.3)",marginTop:1}}>Ingrédient de base</div>
          </div>
          <button onClick={()=>setPantry(p=>!p)} style={{width:44,height:26,borderRadius:13,cursor:"pointer",border:"none",background:pantry?"#74C69D":"rgba(255,255,255,0.1)",position:"relative",transition:"background 0.2s"}}>
            <div style={{width:20,height:20,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:pantry?21:3,transition:"left 0.2s"}}/>
          </button>
        </div>
      </div>

      {/* Actions */}
      <div style={{padding:"14px 20px 30px",flexShrink:0,display:"flex",flexDirection:"column",gap:8,borderTop:"1px solid rgba(255,255,255,0.07)"}}>
        {confirm ? (
          <>
            <div style={{fontSize:12.5,color:"rgba(255,255,255,0.5)",textAlign:"center",marginBottom:2}}>Confirmer la suppression ?</div>
            <button onClick={onDelete} style={{padding:13,border:"none",borderRadius:14,background:"#C0392B",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
              Supprimer définitivement
            </button>
            <button onClick={()=>setConfirm(false)} style={{padding:11,border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,background:"transparent",color:"rgba(255,255,255,0.45)",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
              Annuler
            </button>
          </>
        ) : (
          <>
            <button onClick={()=>canSave&&onSave({name:name.trim(),category,color:getCatColor(category,bottle.color),pantry})}
              disabled={!canSave} style={{padding:13,border:"none",borderRadius:14,background:canSave?"linear-gradient(130deg,#52B788,#A0C4FF)":"rgba(255,255,255,0.07)",color:canSave?"#fff":"rgba(255,255,255,0.2)",fontSize:14,fontWeight:800,cursor:canSave?"pointer":"default",fontFamily:"inherit",transition:"all 0.2s"}}>
              Enregistrer
            </button>
            <button onClick={()=>setConfirm(true)} style={{padding:11,border:"1px solid rgba(255,60,60,0.25)",borderRadius:14,background:"rgba(255,60,60,0.07)",color:"rgba(255,100,100,0.65)",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
              Supprimer cette bouteille
            </button>
          </>
        )}
      </div>
    </ModalWrap>
  );
}

// ─── Manage Categories Modal ──────────────────────────────────────────────
function ManageCategoriesModal({ categories, bottlesByCategory, onAdd, onRename, onDelete, onClose }) {
  const [editIdx, setEditIdx] = React.useState(null);
  const [editVal, setEditVal] = React.useState("");
  const [adding, setAdding]   = React.useState(false);
  const [newCat, setNewCat]   = React.useState("");

  const saveEdit = (idx) => {
    if (editVal.trim() && editVal.trim() !== categories[idx]) onRename(categories[idx], editVal.trim());
    setEditIdx(null);
  };

  return (
    <ModalWrap onClose={onClose}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 20px 12px",flexShrink:0}}>
        <div style={{fontSize:18,fontWeight:800,color:"#fff",letterSpacing:"-0.02em"}}>Catégories</div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.07)",border:"none",borderRadius:20,padding:"5px 12px",color:"rgba(255,255,255,0.45)",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Fermer</button>
      </div>

      {/* List */}
      <div style={{flex:1,overflowY:"auto",padding:"0 20px 24px",display:"flex",flexDirection:"column",gap:7}}>
        {categories.map((cat,i) => {
          const count = (bottlesByCategory[cat]||[]).length;
          const color = getCatColor(cat);
          return (
            <div key={cat} style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"10px 12px"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:color,flexShrink:0}}/>
              {editIdx===i ? (
                <>
                  <input value={editVal} onChange={e=>setEditVal(e.target.value)} autoFocus
                    onKeyDown={e=>{if(e.key==="Enter")saveEdit(i);if(e.key==="Escape")setEditIdx(null);}}
                    style={{flex:1,background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"5px 10px",color:"#fff",fontSize:13,fontFamily:"inherit",outline:"none"}}/>
                  <button onClick={()=>saveEdit(i)} style={{background:"#52B788",border:"none",borderRadius:8,padding:"5px 12px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>OK</button>
                  <button onClick={()=>setEditIdx(null)} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.3)",fontSize:16,cursor:"pointer",lineHeight:1}}>✕</button>
                </>
              ) : (
                <>
                  <span style={{flex:1,fontSize:13.5,fontWeight:500,color:"rgba(255,255,255,0.85)"}}>{cat}</span>
                  <span style={{fontSize:11,color:"rgba(255,255,255,0.28)",marginRight:4}}>{count}</span>
                  <button onClick={()=>{setEditIdx(i);setEditVal(cat);}} style={{background:"rgba(255,255,255,0.07)",border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",color:"rgba(255,255,255,0.5)",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>✏️</button>
                  <button onClick={()=>count===0&&onDelete(cat)} title={count>0?"Retirez d'abord les bouteilles":""} style={{background:count>0?"transparent":"rgba(255,60,60,0.08)",border:"none",borderRadius:8,width:28,height:28,cursor:count>0?"not-allowed":"pointer",color:count>0?"rgba(255,255,255,0.12)":"rgba(255,100,100,0.65)",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>🗑️</button>
                </>
              )}
            </div>
          );
        })}

        {/* Add category */}
        {adding ? (
          <div style={{display:"flex",gap:8,alignItems:"center",background:"rgba(255,255,255,0.04)",border:"1px dashed rgba(255,255,255,0.15)",borderRadius:12,padding:"10px 12px"}}>
            <input value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="Nom de la catégorie" autoFocus
              onKeyDown={e=>{if(e.key==="Enter"&&newCat.trim()){onAdd(newCat.trim());setNewCat("");setAdding(false);}if(e.key==="Escape"){setAdding(false);}}}
              style={{flex:1,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:8,padding:"6px 10px",color:"#fff",fontSize:13,fontFamily:"inherit",outline:"none"}}/>
            <button onClick={()=>{if(newCat.trim()){onAdd(newCat.trim());setNewCat("");setAdding(false);}}} style={{background:"#52B788",border:"none",borderRadius:8,padding:"5px 14px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>OK</button>
            <button onClick={()=>{setAdding(false);setNewCat("");}} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.3)",fontSize:16,cursor:"pointer"}}>✕</button>
          </div>
        ) : (
          <button onClick={()=>setAdding(true)} style={{background:"rgba(255,255,255,0.04)",border:"1px dashed rgba(255,255,255,0.15)",borderRadius:12,padding:"11px",color:"rgba(255,255,255,0.38)",fontSize:12.5,cursor:"pointer",fontFamily:"inherit",width:"100%"}}>
            + Nouvelle catégorie
          </button>
        )}
      </div>
    </ModalWrap>
  );
}

Object.assign(window, { EditBottleModal, ManageCategoriesModal, getCatColor });

</script>

// ─── PIN Modal ────────────────────────────────────────────────────────────
function PinModal({ onSuccess, onClose }) {
  const [digits, setDigits] = React.useState([]);
  const [shake, setShake]   = React.useState(false);
  const CORRECT = "1234";

  const addDigit = d => {
    const next = [...digits, String(d)];
    if (next.length === 4) {
      if (next.join("") === CORRECT) { onSuccess(); }
      else {
        setShake(true);
        setTimeout(() => { setShake(false); setDigits([]); }, 500);
      }
    } else { setDigits(next); }
  };

  const keys = [1,2,3,4,5,6,7,8,9,"",0,"⌫"];

  return (
    <div style={{
      position: "absolute", inset: 0, zIndex: 200,
      background: "rgba(4,4,12,0.92)", backdropFilter: "blur(16px)",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
    }}>
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <div style={{ marginBottom: 10 }}><Icon name="lock" size={28} color="rgba(255,255,255,0.6)" /></div>
        <div style={{ fontSize: 18, fontWeight: 800, color: "#fff", letterSpacing: "-0.02em" }}>Mode Gérant</div>
        <div style={{ fontSize: 13, color: "rgba(255,255,255,0.4)", marginTop: 4 }}>Entrez votre code PIN</div>
      </div>
      {/* Dots */}
      <div style={{ display: "flex", gap: 18, marginBottom: 36,
        animation: shake ? "shakePIN 0.45s" : "none" }}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{
            width: 14, height: 14, borderRadius: "50%",
            background: i < digits.length ? "#A0C4FF" : "rgba(255,255,255,0.18)",
            border: "1.5px solid rgba(255,255,255,0.25)",
            transition: "background 0.12s",
          }} />
        ))}
      </div>
      {/* Keypad */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 68px)", gap: 10 }}>
        {keys.map((k, i) => (
          <button key={i} onClick={() => {
            if (typeof k === "number") addDigit(k);
            else if (k === "⌫") setDigits(d => d.slice(0,-1));
          }} style={{
            width: 68, height: 68, borderRadius: "50%", fontFamily: "inherit",
            background: typeof k === "number" ? "rgba(255,255,255,0.09)" : "transparent",
            border: typeof k === "number" ? "1px solid rgba(255,255,255,0.12)" : "none",
            color: "#fff", fontSize: k === "⌫" ? 20 : 26, fontWeight: 300,
            cursor: k !== "" ? "pointer" : "default",
          }}>{k}</button>
        ))}
      </div>
      <button onClick={onClose} style={{
        marginTop: 24, color: "rgba(255,255,255,0.35)", fontSize: 13,
        background: "none", border: "none", cursor: "pointer", fontFamily: "inherit",
      }}>Annuler</button>
      <style>{`@keyframes shakePIN{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}`}</style>
    </div>
  );
}

};

function AddBottleModal({ onAdd, onClose, allCategories }) {
  const [name, setName]       = React.useState("");
  const [category, setCategory] = React.useState(null);
  const [pantry, setPantry]   = React.useState(false);

  // Merge preset categories with any custom ones passed in
  const presetLabels = BOTTLE_CATEGORIES.map(c => c.label);
  const extraCategories = allCategories ? allCategories.filter(c => !presetLabels.includes(c)) : [];
  const allCats = [
    ...BOTTLE_CATEGORIES,
    ...extraCategories.map(c => ({ label: c, color: "#9E9E9E" })),
  ];
  const selectedCat = BOTTLE_CATEGORIES.find(c => c.label === category);
  const canSubmit = name.trim() && category;

  const handleAdd = () => {
    if (!canSubmit) return;
    onAdd({ id: `custom-${Date.now()}`, name: name.trim(), category, color: selectedCat?.color || "#9E9E9E", owned: true, pantry });
    onClose();
  };

  return (
    <div style={{
      position: "absolute", inset: 0, zIndex: 150,
      background: "rgba(0,0,0,0.65)", backdropFilter: "blur(10px)",
      display: "flex", flexDirection: "column", justifyContent: "flex-end",

        background: "#13131F", border: "1px solid rgba(255,255,255,0.1)",
        borderRadius: "24px 24px 0 0", paddingBottom: 32,
        animation: "slideUpModal 0.28s cubic-bezier(0.4,0,0.2,1)",
      }}>
        {/* Handle */}
        <div style={{ display: "flex", justifyContent: "center", padding: "12px 0 4px" }}>
          <div style={{ width: 36, height: 4, borderRadius: 2, background: "rgba(255,255,255,0.18)" }} />
        </div>
        {/* Title row */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 20px 14px" }}>
          <div style={{ fontSize: 18, fontWeight: 800, color: "#fff", letterSpacing: "-0.02em" }}>Nouvelle bouteille</div>
          <button onClick={onClose} style={{ background: "rgba(255,255,255,0.07)", border: "none", borderRadius: 20, padding: "5px 12px", color: "rgba(255,255,255,0.45)", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Annuler</button>
        </div>
        {/* Name */}
        <div style={{ padding: "0 20px 14px" }}>
          <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: "0.08em", color: "rgba(255,255,255,0.35)", textTransform: "uppercase", marginBottom: 7 }}>Nom</div>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="Ex : Hendrick's Gin…" autoFocus
            style={{ width: "100%", boxSizing: "border-box", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 14, padding: "12px 14px", color: "#fff", fontSize: 16, fontFamily: "inherit", outline: "none" }}
          />
        </div>
        {/* Category */}
        <div style={{ padding: "0 20px 14px" }}>
          <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: "0.08em", color: "rgba(255,255,255,0.35)", textTransform: "uppercase", marginBottom: 7 }}>Catégorie</div>
          <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
            {allCats.map(cat => (
              <button key={cat.label} onClick={() => setCategory(cat.label)} style={{
                padding: "5px 12px", borderRadius: 20, cursor: "pointer", fontFamily: "inherit",
                background: category === cat.label ? `${cat.color}28` : "rgba(255,255,255,0.05)",
                border: category === cat.label ? `1.5px solid ${cat.color}70` : "1.5px solid rgba(255,255,255,0.09)",
                color: category === cat.label ? cat.color : "rgba(255,255,255,0.45)",
                fontSize: 12, fontWeight: category === cat.label ? 700 : 400, transition: "all 0.14s",
                display: "flex", alignItems: "center", gap: 4,
              }}>
                {category === cat.label && <div style={{ width: 5, height: 5, borderRadius: "50%", background: cat.color }} />}
                {cat.label}
              </button>
            ))}
          </div>
        </div>
        {/* Pantry toggle */}
        <div style={{ padding: "0 20px 18px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontSize: 13.5, fontWeight: 600, color: "rgba(255,255,255,0.75)" }}>Toujours disponible</div>
            <div style={{ fontSize: 11.5, color: "rgba(255,255,255,0.3)", marginTop: 1 }}>Ingrédient de base (jus, sirop…)</div>
          </div>
          <button onClick={() => setPantry(p => !p)} style={{
            width: 44, height: 26, borderRadius: 13, cursor: "pointer", border: "none",
            background: pantry ? "#74C69D" : "rgba(255,255,255,0.1)", position: "relative", transition: "background 0.2s",
          }}>
            <div style={{ width: 20, height: 20, borderRadius: "50%", background: "#fff", position: "absolute", top: 3, left: pantry ? 21 : 3, transition: "left 0.2s" }} />

        </div>
        {/* Submit */}

            })}
            <div style={{ marginTop: 4, padding: "11px 15px", borderRadius: 14, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.07)" }}>
              <div style={{ fontSize: 10.5, color: "rgba(255,255,255,0.3)", marginBottom: 4, letterSpacing: "0.06em", textTransform: "uppercase" }}>Garniture</div>
              <div style={{ fontSize: 13.5, color: "rgba(255,255,255,0.65)" }}>{cocktail.garnish}</div>
            </div>
          </div>
        )}

        {/* ILLUSTRATION */}
        {tab === "illustration" && (
          <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
            {/* Full scene as background */}
            {SceneComponent && (
              <div style={{ position: "absolute", inset: 0 }}>
                <SceneComponent />
              </div>
            )}
            {/* Darkening overlay */}
            <div style={{
              position: "absolute", inset: 0,
              background: `linear-gradient(180deg, rgba(0,0,0,0.25) 0%, ${theme.bg}CC 55%, ${theme.bg}EE 100%)`,
            }} />
            {/* Glass illustration centered */}
            <div style={{
              position: "absolute", inset: 0,
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
              gap: 14, paddingBottom: 30,
            }}>
              {GlassComponent ? (
                <div style={{ filter:`drop-shadow(0 0 28px ${theme.accent}88) drop-shadow(0 8px 20px rgba(0,0,0,0.6))`, animation:"floatGlass 3.5s ease-in-out infinite" }}>
                  <GlassComponent />
                </div>
              ) : cocktail.glassUrl ? (
                <div style={{ filter:`drop-shadow(0 0 40px ${theme.accent}99) drop-shadow(0 8px 24px rgba(0,0,0,0.7))`, animation:"floatGlass 3.5s ease-in-out infinite" }}>
                  <img src={cocktail.glassUrl} alt={cocktail.name} style={{ height:200, maxWidth:160, objectFit:"contain", display:"block", borderRadius:12 }} />
                </div>
              ) : null}
              <div style={{ textAlign: "center" }}>
                <div style={{
                  fontSize: 24, fontWeight: 900, color: "#fff",
                  letterSpacing: "-0.03em", textShadow: `0 0 20px ${theme.accent}88`,
                }}>
                  {cocktail.name}
                </div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,0.45)", marginTop: 4 }}>
                  {cocktail.tagline}
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Float glass animation */}
      <style>{`
        @keyframes floatGlass {
          0%, 100% { transform: translateY(0px); }
          50%       { transform: translateY(-10px); }
        }
      `}</style>
    </div>
  );
};

// ─── Bottom Nav ───────────────────────────────────────────────────────────
const BottomNav = ({ activeTab, setActiveTab, counts, isManager, accent }) => {
  const navAccent = accent || "#A0C4FF";
  const managerTabs = [
    { id: 0, label: "Cocktails", icon: "cocktail" },
    { id: 1, label: "Faisables",  icon: "check"   },
    { id: 2, label: "Mon Bar",    icon: "bottle"  },
    { id: 3, label: "Favoris",    icon: "heart"   },
  ];
  const consumerTabs = [
    { id: 0, label: "Menu",      icon: "cocktail" },
    { id: 1, label: "Ce soir",   icon: "eye"      },
    { id: 2, label: "Favoris",   icon: "heart"    },
  ];
  const tabs = isManager ? managerTabs : consumerTabs;
  return (
    <div style={{
      display: "flex",
      background: "rgba(10, 10, 18, 0.96)",
      backdropFilter: "blur(24px)",
      borderTop: "1px solid rgba(255,255,255,0.07)",
      paddingBottom: 22, flexShrink: 0,
    }}>
      {tabs.map(t => {
        const isActive = activeTab === t.id;
        return (
          <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
            flex: 1, display: "flex", flexDirection: "column", alignItems: "center",
            gap: 3, padding: "11px 0 4px",
            background: "none", border: "none", cursor: "pointer",
            transition: "color 0.2s", fontFamily: "inherit",
          }}>
            {/* Active glow dot */}
            {isActive && (
              <div style={{
                position: "absolute",
                width: 4, height: 4, borderRadius: "50%",
                background: navAccent,
                marginTop: -6,
                boxShadow: `0 0 8px ${navAccent}`,
              }} />
            )}
            <div style={{ position: "relative" }}>
              <Icon name={t.icon} size={22} color={isActive ? navAccent : "rgba(255,255,255,0.28)"} />
              {counts && counts[t.id] > 0 && (
                <div style={{
                  position: "absolute", top: -5, right: -7,
                  minWidth: 16, height: 16, borderRadius: 8, padding: "0 4px",
                  background: navAccent,
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>
                  <span style={{ fontSize: 9, fontWeight: 900, color: "#0A0A18" }}>{counts[t.id]}</span>
                </div>
              )}
            </div>
            <span style={{ fontSize: 10, fontWeight: isActive ? 700 : 400, color: isActive ? navAccent : "rgba(255,255,255,0.28)" }}>
              {t.label}
            </span>
          </button>
        );
      })}
    </div>
  );
};

// ─── ROOT APP ─────────────────────────────────────────────────────────────
function CocktailApp({ tweaks }) {
  const { cocktails, bottles } = APP_DATA;

  const [activeTab, setActiveTab]               = React.useState(0);
  const [selectedCocktail, setSelectedCocktail] = React.useState(null);
  const [favorites, setFavorites]               = React.useState(new Set());
  const [ownedBottles, setOwnedBottles]         = React.useState(new Set());
  const [search, setSearch]                     = React.useState("");
  const [currentTheme, setCurrentTheme]         = React.useState(null);
  const [isManager, setIsManager]               = React.useState(true);
  const [availability, setAvailability]         = React.useState({});
  const [showPin, setShowPin]                   = React.useState(false);
  const [customBottles, setCustomBottles]       = React.useState([]);

  // ── Unified editable state ─────────────────────────────────────────────
  const [allBottles, setAllBottles]             = React.useState(() => [...APP_DATA.bottles]);
  const [allCocktailsList, setAllCocktailsList] = React.useState(() => [...APP_DATA.cocktails]);
  const [categories, setCategories]             = React.useState(() => [...new Set(APP_DATA.bottles.map(b => b.category))]);

  const [customCocktails, setCustomCocktails]     = React.useState([]);
  const [showAddCocktail, setShowAddCocktail]       = React.useState(false);
  const [editingBottle, setEditingBottle]           = React.useState(null);
  const [editingCocktail, setEditingCocktail]       = React.useState(null);
  const [showCategories, setShowCategories]         = React.useState(false);

  // ── CRUD handlers ──────────────────────────────────────────────────────
  const addBottle = React.useCallback(bottle => {
    setAllBottles(prev => [...prev, bottle]);
    setOwnedBottles(prev => { const n = new Set(prev); n.add(bottle.id); return n; });
    if (!categories.includes(bottle.category)) setCategories(prev => [...prev, bottle.category]);
  }, [categories]);

  const updateBottle = React.useCallback((id, updates) => {
    setAllBottles(prev => prev.map(b => b.id === id ? { ...b, ...updates } : b));
  }, []);

  const deleteBottle = React.useCallback(id => {
    setAllBottles(prev => prev.filter(b => b.id !== id));
    setOwnedBottles(prev => { const n = new Set(prev); n.delete(id); return n; });
    setEditingBottle(null);
  }, []);

  const addCocktail = React.useCallback(c => {
    setAllCocktailsList(prev => [...prev, c]);
  }, []);

  const updateCocktail = React.useCallback((id, updates) => {
    setAllCocktailsList(prev => prev.map(c => c.id === id ? { ...c, ...updates } : c));
    setEditingCocktail(null);
    setSelectedCocktail(prev => prev?.id === id ? { ...prev, ...updates } : prev);
  }, []);

  const deleteCocktail = React.useCallback(id => {
    setAllCocktailsList(prev => prev.filter(c => c.id !== id));
    setEditingCocktail(null);
    setSelectedCocktail(null);
    setCurrentTheme(null);
  }, []);

  const addCategory    = React.useCallback(name => setCategories(prev => [...prev, name]), []);
  const renameCategory = React.useCallback((old, next) => {
    setCategories(prev => prev.map(c => c === old ? next : c));
    setAllBottles(prev => prev.map(b => b.category === old ? { ...b, category: next } : b));
  }, []);
  const deleteCategory = React.useCallback(name => setCategories(prev => prev.filter(c => c !== name)), []);

  const allCocktails = React.useMemo(() => allCocktailsList, [allCocktailsList]);
  const allBottleMap = React.useMemo(() => Object.fromEntries(allBottles.map(b => [b.id, b])), [allBottles]);

  React.useEffect(() => {
    const init = new Set(bottles.filter(b => b.owned).map(b => b.id));
    setOwnedBottles(init);
  }, []);

  const enrichedCocktails = React.useMemo(() => allCocktails.map(c => {
    const missing = c.ingredients.filter(ing => !ownedBottles.has(ing.id));
    return { ...c, canMake: missing.length === 0, missingCount: missing.length,
      missingIngredients: missing.map(ing => allBottleMap[ing.id]?.name || ing.id) };
  }), [ownedBottles, allBottleMap]);

  const enrichedBottles = React.useMemo(() =>
    allBottles.map(b => ({ ...b, owned: ownedBottles.has(b.id) })), [allBottles, ownedBottles]);

  const handleSelect = React.useCallback(c => {
    setSelectedCocktail(c); setCurrentTheme(c.theme);
  }, []);

  const handleBack = React.useCallback(() => {
    setSelectedCocktail(null); setCurrentTheme(null);
  }, []);

  const toggleFav = React.useCallback(() => {
    if (!selectedCocktail) return;
    setFavorites(f => { const n = new Set(f); n.has(selectedCocktail.id) ? n.delete(selectedCocktail.id) : n.add(selectedCocktail.id); return n; });
  }, [selectedCocktail]);

  const toggleBottle = React.useCallback(id => {
    setOwnedBottles(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  }, []);

  const toggleAvailability = React.useCallback(id => {
    setAvailability(prev => ({ ...prev, [id]: prev[id] === false ? true : false }));
  }, []);

  const handleTab = React.useCallback(tab => {
    setActiveTab(tab); setSelectedCocktail(null); setCurrentTheme(null); setSearch("");
  }, []);

  const switchToConsumer = React.useCallback(() => {
    setIsManager(false); setActiveTab(0); setSelectedCocktail(null); setCurrentTheme(null);
  }, []);

  const switchToManager = React.useCallback(() => {
    setIsManager(true); setShowPin(false); setActiveTab(0); setSelectedCocktail(null); setCurrentTheme(null);
  }, []);

  // Map consumer tab indices to manager-equivalent for shared screens
  const favTabIndex = isManager ? 3 : 2;

  const activePalette = PALETTES[tweaks?.palette || "\u00e9b\u00e8ne"] || PALETTES["\u00e9b\u00e8ne"];

  const appBg = currentTheme
    ? `linear-gradient(160deg, ${currentTheme.bg} 0%, ${currentTheme.from}99 60%, ${currentTheme.bg} 100%)`
    : `linear-gradient(160deg, ${activePalette.bg1} 0%, ${activePalette.bg2} 100%)`;

  return (
    <div style={{
      width: "100%", height: "100%", background: appBg,
      transition: "background 0.65s cubic-bezier(0.4, 0, 0.2, 1)",
      display: "flex", flexDirection: "column",
      fontFamily: "'DM Sans', 'Inter', sans-serif",
      overflow: "hidden", position: "relative",
    }}>
      <div style={{
        position: "absolute", inset: 0, pointerEvents: "none", zIndex: 0, opacity: 0.5,
        backgroundImage: "url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E\")",
      }} />

      {/* Add Cocktail Modal */}
      {showAddCocktail && <AddCocktailModal onAdd={addCocktail} onClose={() => setShowAddCocktail(false)} />}

      {/* Edit Cocktail Modal */}
      {editingCocktail && (
        <AddCocktailModal
          initialData={editingCocktail}
          onAdd={updated => updateCocktail(editingCocktail.id, updated)}
          onDelete={() => deleteCocktail(editingCocktail.id)}
          onClose={() => setEditingCocktail(null)} />
      )}

      {/* Edit Bottle Modal */}
      {editingBottle && (
        <EditBottleModal
          bottle={editingBottle}
          allCategories={categories}
          onSave={updates => { updateBottle(editingBottle.id, updates); setEditingBottle(null); }}
          onDelete={() => deleteBottle(editingBottle.id)}
          onClose={() => setEditingBottle(null)} />
      )}

      {/* Manage Categories Modal */}
      {showCategories && (
        <ManageCategoriesModal
          categories={categories}
          bottlesByCategory={Object.fromEntries(categories.map(cat => [cat, allBottles.filter(b => b.category === cat)]))}
          onAdd={addCategory}
          onRename={renameCategory}
          onDelete={deleteCategory}
          onClose={() => setShowCategories(false)} />
      )}
      {showPin && <PinModal onSuccess={switchToManager} onClose={() => setShowPin(false)} />}

      {/* Content */}
      <div style={{ flex: 1, overflow: "hidden", position: "relative", zIndex: 1 }}>
        {!selectedCocktail && activeTab === 0 && (
          <CatalogueScreen cocktails={enrichedCocktails} onSelect={handleSelect}
            search={search} setSearch={setSearch}
            isManager={isManager} availability={availability}
            onToggleAvailable={toggleAvailability}
            onSwitchToConsumer={switchToConsumer}
            onRequestManagerMode={() => setShowPin(true)}
            onAddCocktail={() => setShowAddCocktail(true)}
            palette={activePalette} />
        )}
        {/* Manager tabs */}
        {isManager && !selectedCocktail && activeTab === 1 && (
          <FaisablesScreen cocktails={enrichedCocktails} onSelect={handleSelect} />
        )}
        {isManager && !selectedCocktail && activeTab === 2 && (
          <BarScreen bottles={enrichedBottles} ownedBottles={ownedBottles} toggleBottle={toggleBottle}
            onAddBottle={addBottle} isManager={isManager}
            allCategories={categories}
            onEditBottle={setEditingBottle}
            onManageCategories={() => setShowCategories(true)} />
        )}
        {/* Consumer tab 1: Ce soir */}
        {!isManager && !selectedCocktail && activeTab === 1 && (
          <ConsumerCeSoirScreen cocktails={enrichedCocktails} onSelect={handleSelect} availability={availability} />
        )}
        {/* Favoris (tab 3 manager / tab 2 consumer) */}
        {!selectedCocktail && activeTab === favTabIndex && (
          <FavorisScreen cocktails={enrichedCocktails} favorites={favorites} onSelect={handleSelect} />
        )}
        {selectedCocktail && (
          <DetailScreen cocktail={selectedCocktail} onBack={handleBack}
            isFav={favorites.has(selectedCocktail.id)} toggleFav={toggleFav}
            ownedBottles={ownedBottles}
            isManager={isManager}
            onEditCocktail={() => setEditingCocktail(selectedCocktail)} />
        )}
      </div>

      <div style={{ position: "relative", zIndex: 2 }}>
        <BottomNav
          activeTab={activeTab} setActiveTab={handleTab} isManager={isManager}
          accent={activePalette.accent}
          counts={isManager
            ? { 1: enrichedCocktails.filter(c => c.canMake).length, 3: favorites.size }
            : { 2: favorites.size }}
        />
      </div>
    </div>
  );
}

Object.assign(window, { CocktailApp });

</script>

<!-- Mount + Tweaks wiring -->
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "layout": "list",
  "accentColor": "#A0C4FF",
  "showMoods": true,
  "palette": "ébène"
}/*EDITMODE-END*/;

function Root() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <React.Fragment>
      <CocktailApp tweaks={t} />
      <TweaksPanel>
        <TweakSection label="Disposition" />
        <TweakRadio
          label="Cartes"
          value={t.layout}
          options={["list", "grid"]}
          onChange={v => setTweak("layout", v)}
        />
        <TweakSection label="Interface" />
        <TweakToggle
          label="Tags d'humeur"
          value={t.showMoods}
          onChange={v => setTweak("showMoods", v)}
        />
        <TweakColor
          label="Couleur nav"
          value={t.accentColor}
          options={["#A0C4FF", "#FFB3C6", "#B9FBC0", "#FFD6A5"]}
          onChange={v => setTweak("accentColor", v)}
        />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("app-root")).render(<Root />);
</script>

</body>
</html>
